<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm người dùng</title>
    <style>
        .admin-content-right {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            background-color: wheat;
        }

        .admin-content-right-product-add {
            width: 50%;
            margin-top: 20px;
            border-radius: 16px;
        }

        .admin-content-right-product-add input {
            width: 100%;
            margin-bottom: 10px;
        }

        .password-field {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        #passwordError {
            color: red;
            display: none;
            height: 8px;
        }

        .error {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-content-right">
        <div class="admin-content-right-product-add">
            <h1>Thêm người dùng</h1>
            <form action="" method="POST">
                <input type="text" name="fullname" placeholder="Nhập họ và tên" value="">
                <input type="password" name="password" placeholder="Nhập mật khẩu">
                <div class="password-field">
                    <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu">
                    <p id="passwordError"></p>
                </div>
                <input type="email" name="email" placeholder="Nhập email" value="">
                <input type="text" name="phonenumber" placeholder="Nhập số điện thoại" value="">
                <button type="submit">Thêm</button>
            </form>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        // Password validation script
        var password = document.querySelector('input[name="password"]');
        var confirm_password = document.querySelector('input[name="confirm_password"]');
        var passwordError = document.getElementById('passwordError');
        var passwordField = document.querySelector('.password-field');

        confirm_password.addEventListener('input', function(){
            if(password.value && confirm_password.value) {
                if(confirm_password.value.length > password.value.length){
                    passwordError.textContent = 'Sai mật khẩu xác nhận.';
                    passwordError.style.display = 'block';
                    passwordField.classList.add('error');
                } else {
                    passwordError.textContent = '';
                    passwordError.style.display = 'none';
                    passwordField.classList.remove('error');
                }
            } else {
                passwordError.textContent = '';
                passwordError.style.display = 'none';
                if(passwordField.classList.contains('error')) {
                    passwordField.classList.remove('error');
                }
            }
        });

        // Email and phone validation script
        $(document).ready(function() {
            $('input[name="email"], input[name="phone"]').on('blur', function() {
                var email = $('input[name="email"]').val();
                var phone = $('input[name="phone"]').val();
                $.ajax({
                    url: 'check_user.html',
                    type: 'POST',
                    data: {
                        'email': email,
                        'phone': phone
                    },
                    success: function(data) {
                        if (data == 'exists') {
                            alert('Email hoặc số điện thoại đã tồn tại. Vui lòng nhập một cái khác.');
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
