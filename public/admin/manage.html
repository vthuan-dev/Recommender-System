<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/style.css">
    <title>Quản trị viên</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
                <div class="position-sticky">
                    <h2 class="text-white text-center py-4">Xin chào: Admin</h2>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#">Doanh số</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" id="productsLink">Sản phẩm</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Đơn hàng</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Khách hàng</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Cài đặt</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div id="mainContent">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Trang chủ</h1>
                        <div class="btn-toolbar mb-2 mb-md-0">
                            <div class="btn-group me-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary">Share</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary">Export</button>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-3 mb-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Total Products</h5>
                                    <p class="card-text display-4">250</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Total Orders</h5>
                                    <p class="card-text display-4">1,234</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Total Customers</h5>
                                    <p class="card-text display-4">5,678</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Revenue</h5>
                                    <p class="card-text display-4">$123,456</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="productsContent" style="display: none;">
                    <!-- Products content will be loaded here -->
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('productsLink').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('productsContent').style.display = 'block';
            
            loadProducts();
        });

        function loadProducts(page = 1) {
            fetch(`/admin/products?page=${page}&limit=10`)
                .then(response => response.json())
                .then(data => {
                    let productsHtml = `
                        <h2>Danh sách sản phẩm</h2>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên sản phẩm</th>
                                    <th>Danh mục</th>
                                    <th>Thương hiệu</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.products.forEach(product => {
                        productsHtml += `
                            <tr>
                                <td>${product.id}</td>
                                <td>${product.name}</td>
                                <td>${product.category_name}</td>
                                <td>${product.brand_name}</td>
                                <td>
                                    <button onclick="editProduct(${product.id})" class="btn btn-sm btn-primary">Sửa</button>
                                    <button onclick="deleteProduct(${product.id})" class="btn btn-sm btn-danger">Xóa</button>
                                </td>
                            </tr>
                        `;
                    });

                    productsHtml += `
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination">
                    `;

                    for (let i = 1; i <= data.totalPages; i++) {
                        productsHtml += `
                            <li class="page-item ${i === data.currentPage ? 'active' : ''}">
                                <a class="page-link" href="#" onclick="loadProducts(${i})">${i}</a>
                            </li>
                        `;
                    }

                    productsHtml += `
                        </ul>
                    </nav>
                    `;

                    document.getElementById('productsContent').innerHTML = productsHtml;
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
