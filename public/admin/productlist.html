<!DOCTYPE html>
<html lang="en">
<head>
    <title>Danh sách sản phẩm</title>
    <style>
        .search-form {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-form input[type="text"] {
            width: 300px;
            height: 40px;
            border: none;
            margin-right: 10px;
            padding: 0 20px;
            font-size: 16px;
            border-radius: 20px;
            outline: none;
            background-color: rgb(189, 195, 199);
        }

        .search-form input[type="submit"] {
            height: 40px;
            border: none;
            background-color: #008CBA;
            color: white;
            padding: 0 20px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            outline: none;
        }

        .search-form input[type="submit"]:hover {
            background-color: #45a049;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            color: white;
            background-color: rgb(116, 185, 255);
            text-decoration: none;
            text-align: center;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: rgb(116, 185, 255);
        }
    </style>
</head>
<body>
    <div class="admin-content-right">
        <h2>Danh sách sản phẩm</h2>
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Id Sản phẩm</th>
                    <th>Tên sản phẩm</th>
                    <th>Mô tả</th>
                    <th>Loại sản phẩm</th>
                    <th>Hình ảnh</th>
                    <th>Nhà sản xuất</th>
                    <th>Bảo hành</th>
                    <th>VAT</th>
                    <th>Phiên bản</th>
                    <th>Giá</th>
                    <th>Lựa chọn</th>
                </tr>
            </thead>
            <tbody>
                <!-- Sample product row -->
                <tr>
                    <td>1</td>
                    <td>1</td>           
                    <td>Sample Product</td>
                    <td>Sample Description</td>
                    <td>Điện thoại</td>
                    <td><img src="sample_image.jpg" alt="Product Image"></td>
                    <td>Sample Manufacturer</td>
                    <td>1 year</td>
                    <td>Included</td>
                    <td>Sample Variant</td>
                    <td>1000000</td>
                    <td><a href="productedit.html?id=1">Sửa</a>|<a href="productdelete.html?id=1">Xóa</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
