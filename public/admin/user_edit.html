<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa người dùng</title>
</head>
<body>
    <div class="admin-content-right">
        <div class="admin-content-right-product-add">
            <h1>Sửa người dùng</h1>
            <form action="" method="POST">
                <input type="text" name="fullname" placeholder="Nhập họ và tên" value="">
                <input type="password" name="password" placeholder="Nhập mật khẩu" value="">
                <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu" value="">
                <input type="email" name="email" placeholder="Nhập email" value="">
                <input type="text" name="phonenumber" placeholder="Nhập số điện thoại" value="">
                <button type="submit">Sửa</button>
            </form>
        </div>
    </div>
</body>
</html>
